name: ui

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"

defaults:
  run:
    working-directory: ui

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci || npm install
        # `|| npm install` while package-lock.json is not committed yet

      - name: Type check
        run: npm run type-check || echo "(no type-check script yet)"

      - name: Lint
        run: npm run lint || echo "(no lint script yet)"

      - name: Build
        run: npm run build || echo "(no build yet — Phase 1 W-I)"
