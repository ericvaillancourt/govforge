name: ui

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ui.yml"
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all JS-based actions before the 2026-06-02
  # deprecation deadline. See .github/workflows/backend.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: ui

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npx eslint .

      - name: Build
        run: npm run build
