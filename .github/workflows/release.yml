name: release

on:
  push:
    tags:
      - "v*.*.*"

# id-token: write — required by cosign keyless signing (Sigstore OIDC).
# contents: write — required to publish the GitHub Release.
permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: cli/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set HOMEBREW_TAP_GITHUB_TOKEN to a fine-grained PAT scoped to
          # ericvaillancourt/homebrew-tap (Contents: read+write). When the
          # secret is absent, GoReleaser logs a warning and skips the brew
          # publish step rather than failing the whole release.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
