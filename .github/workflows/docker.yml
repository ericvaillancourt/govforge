name: docker

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/podman/Containerfile.backend"
      - ".github/workflows/docker.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

# id-token: write — Sigstore OIDC for the keyless cert.
# packages: write — push to ghcr.io.
# attestations: write — required by actions/attest-build-provenance@v2 to
#   persist the attestation back to the repo's /attestations endpoint.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/govforge-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          tags="${IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            tags="${tags},${IMAGE}:${version}"
            tags="${tags},${IMAGE}:v${version}"
          fi
          tags="${tags},${IMAGE}:sha-${GITHUB_SHA::7}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/podman/Containerfile.backend
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
