name: cli

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all JS-based actions before the 2026-06-02
  # deprecation deadline. See .github/workflows/backend.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    working-directory: cli

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: cli/go.sum

      - name: Download
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # v2.x required for Go 1.25 (v1.x is built with Go 1.24).
          # Pinned to a specific release so CI doesn't drift on each run.
          version: v2.12.2
          working-directory: cli
          args: --timeout=5m
