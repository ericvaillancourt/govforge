name: Feature request
description: Suggest a capability that GovForge doesn't have yet.
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For a quick discussion or "would this even fit?" check, please
        open a [Discussion](https://github.com/ericvaillancourt/govforge/discussions)
        first. Use this issue template once the idea is concrete enough
        to scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that makes you want this feature. A concrete scenario beats an abstract goal.
      placeholder: When Claude proposes a migration, the policy run blocks it but I can't see *which* file triggered the auth_change rule from the cockpit.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
      description: Your best current idea of the shape of the solution. It's fine if it changes during discussion.
      placeholder: Add an `evidence` panel on the Decision Detail page that lists the matched files for each blocked policy.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds did you try? Why aren't they enough?

  - type: dropdown
    id: scope
    attributes:
      label: Which component would this touch?
      multiple: true
      options:
        - backend (services / models / SQL)
        - mcp (tools / resources / prompts)
        - api (HTTP routes)
        - cli (gf commands)
        - ui (cockpit pages / components)
        - site (marketing govforge.dev)
        - docs
        - infra
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Which phase do you think this belongs to?
      description: See [roadmap](https://govforge.dev/) — a rough placement is fine.
      options:
        - Phase 1 (MVP local)
        - Phase 2 (public launch + observability)
        - Phase 3 (SaaS / multi-user)
        - Phase 4+ (later)
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues + Discussions and didn't find a duplicate.
          required: true
        - label: This is in scope (not a destructive Git operation, not a shell-out from MCP — see the [threat model](../docs/threat-model.md)).
          required: true
