# GovForge default policies — generated by `gf init`.
# Adjust these values to fit your project; remove a section to disable a policy.
# See https://govforge.dev/docs/policies for the full reference.

[auth_change_requires_review]
enabled = true
severity = "high"
patterns = ["auth", "session", "jwt", "permission", "middleware"]

[secret_pattern_detection]
enabled = true
severity = "critical"
file_patterns = [".env"]
content_patterns = ["AWS_SECRET_ACCESS_KEY", "PRIVATE_KEY", "password=", "api_key="]

[test_required_for_high_risk]
enabled = true
severity = "medium"

[migration_requires_review]
enabled = true
severity = "high"

[large_diff_requires_human_approval]
enabled = true
severity = "medium"
max_lines_changed = 500
