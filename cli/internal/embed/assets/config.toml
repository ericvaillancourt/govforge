# GovForge project configuration — generated by `gf init`.
# This file lives in .govforge/config.toml at the project root.

# Local API binding (consumed by `gf api serve` and the CLI).
api_url = "http://127.0.0.1:8787"

# Project metadata. The `name` shows up in the cockpit and audit exports.
[project]
name = "{{PROJECT_NAME}}"
default_branch = "{{DEFAULT_BRANCH}}"
