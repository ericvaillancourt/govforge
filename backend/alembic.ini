# Alembic configuration for GovForge.
#
# Migrations live inside the package (`src/govforge/db/migrations/`) so they
# travel with the wheel and are runnable from a production container.
#
# Run from `backend/`:
#   alembic upgrade head                                    # apply pending
#   alembic revision --autogenerate -m "add foo table"      # new migration
#   alembic current                                         # show applied head
#   alembic history                                         # full history
#   alembic stamp head                                      # mark current schema as up-to-date (no SQL)
#
# The DB URL is NOT pinned here; env.py reads it from `GOVFORGE_DATABASE_URL`
# (or its alias `GOVFORGE_DB`) so the same migrations apply to local SQLite
# and prod Postgres without config drift.

[alembic]
script_location = src/govforge/db/migrations

# Use a single source of truth for the version table name.
version_table = alembic_version

# Migration file naming: YYYYMMDD_HHMMSS_<slug>.py — easier to grep than
# the default monotonic counter.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Default to UTC timestamps so file mtimes match commit times across hosts.
timezone = UTC

# Don't render type imports from sqlalchemy.dialects unless they're actually used.
truncate_slug_length = 40

# Set to "true" to abort autogenerate when no changes detected (CI safety net).
revision_environment = false

# Source paths added to sys.path before importing env.py (alongside backend/src).
prepend_sys_path = src

# Loggers — keep alembic's output legible without flooding stdout.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
