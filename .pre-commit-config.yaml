# GovForge pre-commit hooks
# Install : pipx install pre-commit && pre-commit install

repos:
  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  # Python (backend/)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Go (cli/)
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        files: ^cli/.*\.go$
      - id: go-vet-mod
        files: ^cli/.*\.go$
        args: ["-C=cli", "./..."]

  # JS/TS (site/, ui/)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^(site|ui)/.*\.(ts|tsx|js|jsx|json|css|md|yaml|yml)$
        exclude: ^(site|ui)/(\.next|out|node_modules)/
